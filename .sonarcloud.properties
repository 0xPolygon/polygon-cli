# SonarCloud Automatic Analysis configuration.
# https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/automatic-analysis/

# Treat Go test files as test code so they are not measured as production
# sources (duplication, code smells); testdata holds captured API fixtures,
# not code, so it is excluded from analysis entirely.
sonar.sources=.
sonar.exclusions=**/*_test.go,**/testdata/**,bindings/**,doc/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go
